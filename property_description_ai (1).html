<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI物件説明文ジェネレーター</title>
<style>
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --gold:#c9a84c;--gold2:#e8c97a;
  --text:#f0ede8;--text2:#9b98a3;--text3:#6b6875;
  --green2:#52b788;--red:#e63946;--radius:12px;--radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}
#app{max-width:680px;margin:0 auto;padding:0 0 80px}
#header{padding:20px 20px 0;margin-bottom:24px}
#header h1{font-size:20px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:10px;margin-bottom:4px}
#header h1 span{font-size:11px;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1400;padding:3px 8px;border-radius:4px}
#header p{font-size:12px;color:var(--text3)}
.section{padding:0 20px;margin-bottom:20px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;color:var(--text2)}
.form-control{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s;width:100%}
.form-control:focus{border-color:var(--gold)}
.form-control::placeholder{color:var(--text3)}
select.form-control{appearance:none;cursor:pointer}
textarea.form-control{resize:none;line-height:1.6}
.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--gold);color:var(--gold)}
.chip.active{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent;color:#1a1400;font-weight:700}
.generate-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 40px);margin:0 20px 20px;height:52px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a1400;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.03em;transition:opacity .15s,transform .1s}
.generate-btn:active{transform:scale(0.98)}
.generate-btn svg{width:18px;height:18px}
#result-section{padding:0 20px;display:none}
.result-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.rtab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.rtab.active{background:var(--surface2);border-color:var(--gold);color:var(--gold);font-weight:700}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:none}
.result-card.active{display:block}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.result-meta{display:flex;gap:8px;align-items:center}
.result-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(201,168,76,0.15);color:var(--gold2);letter-spacing:.05em}
.char-count{font-size:11px;color:var(--text3)}
.copy-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:11px;font-family:inherit;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:var(--gold);color:var(--gold)}
.copy-btn.copied{border-color:var(--green2);color:var(--green2)}
.copy-btn svg{width:13px;height:13px}
.result-text{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;word-break:break-all}
.result-limit{margin-top:8px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.limit-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.limit-fill{height:100%;background:var(--green2);border-radius:2px;transition:width .3s}
.limit-fill.over{background:var(--red)}
.regen-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;height:42px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:8px}
.regen-btn:hover{border-color:var(--gold);color:var(--gold)}
.regen-btn svg{width:14px;height:14px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>AI物件説明文 <span>テンプレート式</span></h1>
    <p>物件情報を入力するだけで媒体別の説明文を自動生成します</p>
  </div>

  <div class="section">
    <div class="section-label">物件基本情報</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">物件種別 *</label>
        <select class="form-control" id="prop-type">
          <option value="">選択してください</option>
          <option>空き家（戸建て）</option>
          <option>売地</option>
          <option>中古戸建て</option>
          <option>新築戸建て</option>
          <option>中古マンション</option>
          <option>収益物件</option>
          <option>古民家</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">築年数</label>
        <input class="form-control" id="prop-age" placeholder="例：築35年" type="text">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">所在地（エリア）*</label>
        <input class="form-control" id="prop-location" placeholder="例：沖縄県那覇市" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">価格・賃料</label>
        <input class="form-control" id="prop-price" placeholder="例：1,200万円" type="text">
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">広さ・間取り</label>
        <input class="form-control" id="prop-size" placeholder="例：3LDK・85㎡" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">構造</label>
        <input class="form-control" id="prop-structure" placeholder="例：木造2階建て" type="text">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">アピールポイント（カンマ区切りで複数入力可）</label>
      <textarea class="form-control" id="prop-features" rows="3" placeholder="例：南向き、駅徒歩5分、庭付き、リフォーム済み、閑静な住宅街、投資利回り8%"></textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-label">出力媒体</div>
    <div class="chip-group" id="media-chips">
      <button class="chip active" data-val="suumo">SUUMO（200字）</button>
      <button class="chip active" data-val="athome">at home（150字）</button>
      <button class="chip active" data-val="flyer">チラシ・資料用</button>
      <button class="chip active" data-val="sns">LINE・SNS用</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">文章トーン</div>
    <div class="chip-group" id="tone-chips">
      <button class="chip active" data-val="pro">プロ・投資家向け</button>
      <button class="chip" data-val="impact">第一印象重視</button>
      <button class="chip" data-val="friendly">フレンドリー</button>
      <button class="chip" data-val="formal">丁寧・落ち着いた</button>
    </div>
  </div>

  <button class="generate-btn" id="gen-btn" onclick="generate()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    説明文を生成する
  </button>

  <div id="result-section">
    <div class="section-label" style="padding:0 0 10px">生成結果</div>
    <div class="result-tabs" id="result-tabs"></div>
    <div id="result-cards"></div>
    <button class="regen-btn" onclick="generate()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      別のパターンで再生成
    </button>
  </div>
</div>

<script>
const MEDIA_CONFIG = {
  suumo:  {label:'SUUMO',      limit:200, badge:'SUUMO 200字'},
  athome: {label:'at home',    limit:150, badge:'at home 150字'},
  flyer:  {label:'チラシ・資料', limit:400, badge:'チラシ・資料'},
  sns:    {label:'LINE・SNS',  limit:100, badge:'LINE・SNS'},
};

let activeMedia = new Set(['suumo','athome','flyer','sns']);
let activeTone = 'pro';
let patternIdx = 0;

document.querySelectorAll('#media-chips .chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    if (activeMedia.has(val)) {
      if (activeMedia.size > 1) { activeMedia.delete(val); btn.classList.remove('active'); }
    } else { activeMedia.add(val); btn.classList.add('active'); }
  });
});

document.querySelectorAll('#tone-chips .chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#tone-chips .chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTone = btn.dataset.val;
  });
});

function buildText(template, info) {
  return template
    .replace(/\{type\}/g, info.type)
    .replace(/\{location\}/g, info.location)
    .replace(/\{age\}/g, info.age)
    .replace(/\{price\}/g, info.price)
    .replace(/\{size\}/g, info.size)
    .replace(/\{structure\}/g, info.structure)
    .replace(/\{features\}/g, info.features.join('・'))
    .replace(/\{feature1\}/g, info.features[0]||'')
    .replace(/\{feature2\}/g, info.features[1]||'')
    .replace(/\{feature3\}/g, info.features[2]||'')
    .replace(/\s*\(\)/g,'').replace(/・+/g,'・').replace(/^・|・$/g,'').trim();
}

const TEMPLATES = {
  pro: {
    suumo: [
      '{location}に{type}が登場。{age}{structure}{size}。{features}。収益性・資産価値ともに注目の一物件です。詳細はお気軽にお問い合わせください。',
      '【{location}・{type}】{age}の{structure}。{size}。{features}。投資・実需どちらにも対応できる希少物件。早期のご検討をおすすめします。',
    ],
    athome: [
      '{location}の{type}。{age}{size}。{features}。資産価値の高いエリアで注目の物件です。',
      '【{type}】{location}。{features}。{age}{size}。詳細資料ご用意しております。',
    ],
    flyer: [
      '■ {location}　{type}\n\n{age}の{structure}が、今回特別にご案内可能となりました。{size}の広さに{features}を兼ね備えた、希少性の高い物件です。\n\n資産活用・実需双方の観点からも注目度の高いエリアに位置しており、早期のご決断をおすすめいたします。\n\n詳しい資料・現地案内はお気軽にご連絡ください。',
      '◆ {type}のご案内 ◆\n\n所在地：{location}\n物件概要：{age}／{size}／{structure}\nポイント：{features}\n\n投資・実需いずれのお客様にもお勧めできる優良物件です。ご興味のある方はお早めにご連絡ください。',
    ],
    sns: [
      '【{location}・{type}】{features}。{age}{size}。詳細DM受付中📩',
      '✨{location}に{type}！{features}。{age}。お問い合わせはDMまで！',
    ],
  },
  impact: {
    suumo: [
      '【注目物件】{location}に待望の{type}！{features}を備えた{age}の{structure}。{size}のゆとりある空間で、新生活をスタートしませんか？',
      '見逃せない！{location}の{type}。{features}が魅力の{age}物件。{size}。この機会をお見逃しなく！',
    ],
    athome: [
      '【必見】{location}の{type}！{features}。{age}{size}。今すぐお問い合わせを！',
      '話題の{location}エリアに{type}が登場！{features}。{size}。ぜひご覧ください！',
    ],
    flyer: [
      '🏠 {location}に注目の{type}が登場！\n\n{features}を備えた{age}の{structure}。{size}のゆとりある間取りで、あなたの理想の暮らしが実現できます。\n\nこの機会をお見逃しなく！まずはお気軽にご相談ください。',
      '━━━━━━━━━━━━━━━━\n⚡ 注目！{type}\n━━━━━━━━━━━━━━━━\n\n📍 {location}\n🏗 {age}／{size}\n✨ {features}\n\n今すぐお問い合わせください！',
    ],
    sns: [
      '🏠{location}に{type}！✨{features}。{age}{size}。気になる方はDMへ📩',
      '【必見🔥】{location}の{type}。{features}！{age}。詳細はDMまで！',
    ],
  },
  friendly: {
    suumo: [
      '{location}で素敵な{type}を見つけました！{age}ですが{features}で、とても住みやすい環境です。{size}の広さで、ご家族にもおすすめですよ。',
      'こんな物件いかがですか？{location}の{type}。{features}が自慢の{age}物件。{size}でゆったり暮らせます。',
    ],
    athome: [
      '{location}の{type}です！{features}で暮らしやすい環境。{age}{size}。ぜひ一度見に来てください♪',
      '素敵な{type}のご紹介🏠{location}。{features}。{age}{size}。お気軽にどうぞ！',
    ],
    flyer: [
      'こんにちは！素敵な物件のご紹介です🏠\n\n{location}に{type}が出ました！{age}の{structure}で、{features}が揃っています。{size}の広さもゆったりで、ご家族にもぴったりです。\n\nまずはお気軽にお問い合わせください。見学も大歓迎です！',
    ],
    sns: [
      '🏠{location}に{type}！{features}で快適な暮らし♪{age}{size}。気になる方はDMください😊',
    ],
  },
  formal: [
    'suumo',
  ],
};

TEMPLATES.formal = {
  suumo: [
    '{location}に{type}をご案内申し上げます。{age}の{structure}で、{features}を備えております。{size}のゆとりある物件です。詳細はお問い合わせください。',
    '【{type}】{location}所在。{age}・{size}・{structure}。{features}。ご内覧も承っております。',
  ],
  athome: [
    '{location}の{type}をご案内いたします。{features}。{age}{size}。お問い合わせをお待ちしております。',
    '【{location}・{type}】{age}の物件です。{features}。{size}。詳細はお気軽にどうぞ。',
  ],
  flyer: [
    '謹啓\n\nこの度、{location}に{type}をご案内申し上げます。\n\n本物件は{age}の{structure}で、{size}のゆとりある空間に{features}を兼ね備えております。\n\nご内覧・詳細資料のご請求は、下記までお気軽にお問い合わせください。\n\n謹白',
  ],
  sns: [
    '【{type}のご案内】{location}。{features}。{age}{size}。詳細はDMにてお問い合わせください。',
  ],
};

function generate() {
  const type      = document.getElementById('prop-type').value;
  const age       = document.getElementById('prop-age').value;
  const location  = document.getElementById('prop-location').value;
  const price     = document.getElementById('prop-price').value;
  const size      = document.getElementById('prop-size').value;
  const structure = document.getElementById('prop-structure').value;
  const featuresRaw = document.getElementById('prop-features').value;

  if (!type && !location) {
    alert('物件種別または所在地を入力してください');
    return;
  }

  const features = featuresRaw.split(/[、,，\n]/).map(s => s.trim()).filter(Boolean);
  const info = {
    type: type || '物件',
    age: age ? age + 'の' : '',
    location: location || 'お問い合わせください',
    price: price || '',
    size: size || '',
    structure: structure || '',
    features,
  };

  const tone = activeTone;
  const templates = TEMPLATES[tone] || TEMPLATES.pro;

  const results = {};
  [...activeMedia].forEach(m => {
    const list = templates[m] || TEMPLATES.pro[m] || [];
    if (list.length === 0) { results[m] = ''; return; }
    const tmpl = list[patternIdx % list.length];
    let text = buildText(tmpl, info);
    if (price && !text.includes(price)) text += `　${price}`;
    results[m] = text;
  });

  patternIdx++;
  renderResults(results);

  const rs = document.getElementById('result-section');
  rs.style.display = 'block';
  rs.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderResults(results) {
  const mediaArr = [...activeMedia];
  const tabs = document.getElementById('result-tabs');
  const cards = document.getElementById('result-cards');

  tabs.innerHTML = mediaArr.map((m, i) =>
    `<button class="rtab ${i===0?'active':''}" onclick="switchTab('${m}')" id="tab-${m}">${MEDIA_CONFIG[m].label}</button>`
  ).join('');

  cards.innerHTML = mediaArr.map((m, i) => {
    const text = results[m] || '';
    const limit = MEDIA_CONFIG[m].limit;
    const len = text.length;
    const pct = Math.min(100, Math.round(len/limit*100));
    const over = len > limit;
    return `
    <div class="result-card ${i===0?'active':''}" id="card-${m}">
      <div class="result-header">
        <div class="result-meta">
          <span class="result-badge">${MEDIA_CONFIG[m].badge}</span>
          <span class="char-count">${len}字</span>
        </div>
        <button class="copy-btn" id="copy-${m}" onclick="copyText('${m}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          コピー
        </button>
      </div>
      <div class="result-text" id="text-${m}">${text}</div>
      <div class="result-limit">
        <span>${len}/${limit}字</span>
        <div class="limit-bar"><div class="limit-fill ${over?'over':''}" style="width:${pct}%"></div></div>
        ${over?'<span style="color:var(--red)">超過</span>':'<span style="color:var(--green2)">OK</span>'}
      </div>
    </div>`;
  }).join('');
}

function switchTab(m) {
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.result-card').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+m)?.classList.add('active');
  document.getElementById('card-'+m)?.classList.add('active');
}

function copyText(m) {
  const text = document.getElementById('text-'+m)?.textContent||'';
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copy-'+m);
    btn.classList.add('copied');
    btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> コピー済み`;
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> コピー`;
    },2000);
  });
}
</script>
</body>
</html>
