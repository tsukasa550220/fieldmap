<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>フィールドマップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --green-dark:  #1b4332;
    --green-mid:   #2d6a4f;
    --green-light: #52b788;
    --green-pale:  #d8f3dc;
    --amber:       #f4a261;
    --red:         #e63946;
    --gray:        #adb5bd;
    --blue:        #4361ee;
    --white:       #ffffff;
    --surface:     #f8f9fa;
    --border:      #dee2e6;
    --text:        #212529;
    --text-muted:  #6c757d;
    --header-h:    60px;
    --panel-h:     260px;
    --tab-h:       60px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--green-dark);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── ヘッダー ── */
  #header {
    height: var(--header-h);
    background: var(--green-dark);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0;
    z-index: 100;
  }
  #header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  #search-box {
    flex: 1;
    height: 36px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 18px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 7px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    cursor: pointer;
  }
  #search-box svg { flex-shrink: 0; }

  /* ── タブ切替 ── */
  #tab-bar {
    height: var(--tab-h);
    background: var(--white);
    display: flex;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 10px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color .15s;
  }
  .tab-btn.active { color: var(--green-mid); }
  .tab-btn svg { width: 20px; height: 20px; }

  /* ── コンテンツ領域 ── */
  #content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* ── 地図タブ ── */
  #view-map {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
  }
  #map {
    flex: 1;
  }

  /* 地図コントロール */
  #map-controls {
    position: absolute;
    right: 12px;
    top: 12px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .map-ctrl-btn {
    width: 36px;
    height: 36px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,.12);
  }

  /* 凡例 */
  #legend {
    position: absolute;
    left: 10px;
    top: 10px;
    z-index: 500;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
  }
  .legend-row { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* 件数バッジ */
  #count-badge {
    position: absolute;
    bottom: calc(var(--panel-h) + 8px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    background: var(--green-dark);
    color: var(--white);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 12px;
    white-space: nowrap;
  }

  /* ── 物件詳細パネル ── */
  #detail-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--panel-h);
    background: var(--white);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    z-index: 400;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform .28s cubic-bezier(.32,0,.67,0);
  }
  #detail-panel.open { transform: translateY(0); }

  .panel-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }
  #panel-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 12px;
  }
  #panel-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  #panel-address {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  #panel-status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  #panel-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .panel-cell {
    background: var(--surface);
    border-radius: 8px;
    padding: 7px 9px;
  }
  .panel-cell-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .panel-cell-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  #panel-memo {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    line-height: 1.5;
    background: var(--surface);
    border-radius: 8px;
    padding: 8px 10px;
  }
  #panel-actions {
    display: flex;
    gap: 8px;
    padding-bottom: 4px;
  }
  .panel-action-btn {
    flex: 1;
    height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .panel-action-btn.primary {
    background: var(--green-mid);
    border-color: var(--green-mid);
    color: var(--white);
  }

  /* ── 一覧タブ ── */
  #view-list {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    background: var(--surface);
  }
  #list-filter {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    overflow-x: auto;
    flex-shrink: 0;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }
  .filter-chip {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--white);
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-chip.active {
    background: var(--green-mid);
    border-color: var(--green-mid);
    color: var(--white);
  }
  #list-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .list-card {
    background: var(--white);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 12px 14px;
    cursor: pointer;
    transition: transform .1s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .list-card:active { transform: scale(0.98); }
  .list-pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .list-card-body { flex: 1; min-width: 0; }
  .list-card-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .list-card-meta {
    font-size: 11px;
    color: var(--text-muted);
  }
  .list-card-status {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  /* ── 追加タブ（物件追加フォーム）── */
  #view-add {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    background: var(--surface);
    overflow-y: auto;
  }
  #view-add .form-wrap { padding: 16px 14px 80px; }
  .form-section {
    font-size: 11px;
    font-weight: 700;
    color: var(--green-mid);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin: 18px 0 8px;
  }
  .form-section:first-child { margin-top: 0; }
  .form-group { margin-bottom: 10px; }
  .form-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    display: block;
  }
  .form-control {
    width: 100%;
    height: 42px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--white);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .form-control:focus { border-color: var(--green-mid); }
  select.form-control { appearance: none; cursor: pointer; }
  textarea.form-control {
    height: 80px;
    padding: 10px 12px;
    resize: none;
    line-height: 1.5;
  }

  /* 音声入力ボタン */
  .voice-wrap {
    position: relative;
  }
  .voice-wrap textarea { padding-right: 48px; }
  .voice-btn {
    position: absolute;
    right: 8px;
    bottom: 8px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--green-mid);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .voice-btn.listening {
    background: var(--red);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }
  .voice-btn svg { width: 16px; height: 16px; }

  /* 現在地ボタン */
  #gps-btn {
    width: 100%;
    height: 42px;
    border: 1px dashed var(--green-light);
    border-radius: 10px;
    background: var(--green-pale);
    color: var(--green-dark);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  #lat-lng-display {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
    text-align: center;
  }

  /* 送信ボタン */
  #add-submit {
    position: fixed;
    bottom: calc(var(--tab-h) + 10px);
    left: 14px;
    right: 14px;
    height: 50px;
    background: var(--green-mid);
    color: var(--white);
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: .03em;
  }

  /* ── 訪問記録フォーム（モーダル風）── */
  #visit-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 1000;
    display: none;
    align-items: flex-end;
  }
  #visit-overlay.open { display: flex; }
  #visit-sheet {
    width: 100%;
    background: var(--white);
    border-radius: 20px 20px 0 0;
    padding: 14px 16px 30px;
    max-height: 85dvh;
    overflow-y: auto;
  }
  #visit-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
    text-align: center;
  }
  #visit-close {
    position: absolute;
    right: 16px;
    top: 14px;
    background: none;
    border: none;
    font-size: 20px;
    color: var(--text-muted);
    cursor: pointer;
    line-height: 1;
  }
  #visit-submit {
    width: 100%;
    height: 50px;
    background: var(--green-mid);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* ── トースト ── */
  #toast {
    position: fixed;
    bottom: calc(var(--tab-h) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green-dark);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    z-index: 2000;
    white-space: nowrap;
    pointer-events: none;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ローディング */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--green-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 16px;
    transition: opacity .4s;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  .loader-icon {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(255,255,255,.2);
    border-top-color: var(--green-light);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: rgba(255,255,255,.7); font-size: 13px; }
  #loading h2 { color: var(--white); font-size: 18px; font-weight: 700; }
</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loading">
  <div class="loader-icon"></div>
  <h2>フィールドマップ</h2>
  <p>読み込み中...</p>
</div>

<!-- ヘッダー -->
<div id="header">
  <h1>📍 フィールドマップ</h1>
  <div id="search-box" onclick="focusSearch()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    住所・物件名で検索...
  </div>
</div>

<!-- メインコンテンツ -->
<div id="content">

  <!-- ① 地図ビュー -->
  <div id="view-map" style="display:flex;">
    <div id="map"></div>
    <div id="map-controls">
      <div class="map-ctrl-btn" onclick="locateMe()" title="現在地">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      </div>
    </div>
    <div id="legend">
      <div class="legend-row"><div class="legend-dot" style="background:var(--gray)"></div>未訪問</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--red)"></div>訪問済</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--amber)"></div>商談中</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--green-light)"></div>成約</div>
    </div>
    <div id="count-badge">0件</div>
  </div>

  <!-- ② 一覧ビュー -->
  <div id="view-list" style="display:none; flex-direction:column; position:absolute; inset:0;">
    <div id="list-filter">
      <div class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">すべて</div>
      <div class="filter-chip" data-filter="未訪問" onclick="setFilter('未訪問',this)">未訪問</div>
      <div class="filter-chip" data-filter="訪問済" onclick="setFilter('訪問済',this)">訪問済</div>
      <div class="filter-chip" data-filter="商談中" onclick="setFilter('商談中',this)">商談中</div>
      <div class="filter-chip" data-filter="成約" onclick="setFilter('成約',this)">成約</div>
    </div>
    <div id="list-body"></div>
  </div>

  <!-- ③ 追加ビュー -->
  <div id="view-add" style="display:none; flex-direction:column;">
    <div class="form-wrap">
      <div class="form-section">基本情報</div>
      <div class="form-group">
        <label class="form-label">物件名・住所 *</label>
        <input class="form-control" id="add-name" placeholder="東京都〇〇市〇〇町1-2-3" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">物件種別</label>
        <select class="form-control" id="add-type">
          <option value="">選択してください</option>
          <option>空き家</option>
          <option>売地</option>
          <option>収益物件</option>
          <option>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select class="form-control" id="add-status">
          <option>未訪問</option>
          <option>訪問済</option>
          <option>商談中</option>
          <option>成約</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">担当者名</label>
        <input class="form-control" id="add-assigned" placeholder="田中" type="text">
      </div>

      <div class="form-section">建物情報</div>
      <div class="form-group">
        <label class="form-label">築年数</label>
        <input class="form-control" id="add-age" placeholder="例：築35年" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">建物情報</label>
        <input class="form-control" id="add-building" placeholder="例：木造2階建・80㎡" type="text">
      </div>

      <div class="form-section">所有者情報</div>
      <div class="form-group">
        <label class="form-label">所有者名</label>
        <input class="form-control" id="add-owner-name" placeholder="山田太郎" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">所有者連絡先</label>
        <input class="form-control" id="add-owner-tel" placeholder="090-0000-0000" type="tel">
      </div>

      <div class="form-section">位置情報</div>
      <button id="gps-btn" onclick="geocodeAddress()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        住所からピン位置を取得
      </button>
      <div id="lat-lng-display">「住所からピン位置を取得」を押してください</div>
      <input type="hidden" id="add-lat">
      <input type="hidden" id="add-lng">

      <div class="form-section">メモ</div>
      <div class="form-group voice-wrap">
        <label class="form-label">メモ（音声入力可）</label>
        <textarea class="form-control" id="add-memo" placeholder="特記事項を入力..."></textarea>
        <button class="voice-btn" id="voice-btn-add" onclick="startVoice('add-memo','voice-btn-add')" title="音声入力">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<!-- タブバー -->
<div id="tab-bar">
  <button class="tab-btn active" id="tab-map" onclick="switchTab('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3z"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
    地図
  </button>
  <button class="tab-btn" id="tab-list" onclick="switchTab('list')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    一覧
  </button>
  <button class="tab-btn" id="tab-add" onclick="switchTab('add')">

  この物件を登録する

<!-- トースト -->
<div id="toast"></div>

<script>
// ============================================================
// 設定（GASのURLをここに貼り付ける）
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyRvxS-vojpnEUgK1x3XF8cga5x2zd0PAFEelrox4S6scUtxP3YdprBP3xls8HRTDhO/exec';

// ============================================================
// サンプルデータ（GAS連携前のデモ用）
// ============================================================
const SAMPLE_DATA = [
  { id:'P-001', name:'山田邸（空き家）', lat:35.6895, lng:139.6917, status:'商談中', type:'空き家', age:'築38年', building:'木造2階建・72㎡', ownerName:'山田太郎', ownerTel:'090-1234-5678', assigned:'田中', lastVisit:'2026/03/18', nextVisit:'2026/03/28', memo:'所有者と面談済。前向きな反応あり。' },
  { id:'P-002', name:'旧佐藤商店', lat:35.691, lng:139.695, status:'未訪問', type:'売地', age:'', building:'', ownerName:'佐藤花子', ownerTel:'080-9876-5432', assigned:'田中', lastVisit:'', nextVisit:'', memo:'' },
  { id:'P-003', name:'緑町アパート', lat:35.687, lng:139.688, status:'成約', type:'収益物件', age:'築22年', building:'RC造3階・6戸', ownerName:'鈴木一郎', ownerTel:'03-1234-5678', assigned:'田中', lastVisit:'2026/03/10', nextVisit:'', memo:'契約完了。引き渡し4月予定。' },
  { id:'P-004', name:'中村家跡地', lat:35.6935, lng:139.698, status:'訪問済', type:'空き家', age:'築55年', building:'木造平屋・50㎡', ownerName:'中村次郎', ownerTel:'090-5555-1234', assigned:'田中', lastVisit:'2026/03/20', nextVisit:'2026/04/05', memo:'老朽化が激しい。所有者は売却に前向き。' },
  { id:'P-005', name:'駅前空き地', lat:35.686, lng:139.6935, status:'未訪問', type:'売地', age:'', building:'', ownerName:'', ownerTel:'', assigned:'田中', lastVisit:'', nextVisit:'', memo:'' },
];

// ============================================================
// 状態管理
// ============================================================
let properties = [];
let markers = {};
let map;
let currentProperty = null;
let currentFilter = 'all';
let recognition = null;
let listeningBtn = null;

const STATUS_COLOR = {
  '未訪問': 'var(--gray)',
  '訪問済': 'var(--red)',
  '商談中': 'var(--amber)',
  '成約':   'var(--green-light)',
};
const STATUS_BG = {
  '未訪問': '#f1f3f5', '訪問済': '#fff0f0',
  '商談中': '#fff9ec', '成約': '#d8f3dc',
};
const STATUS_FG = {
  '未訪問': '#6c757d', '訪問済': '#c0392b',
  '商談中': '#9a5500', '成約': '#1b4332',
};

// ============================================================
// 初期化
// ============================================================
window.addEventListener('load', async () => {
  initMap();
  await loadData();
  hideLoading();
});

function initMap() {
  map = L.map('map', {
    center: [35.6895, 139.6917],
    zoom: 14,
    zoomControl: false,
    attributionControl: true,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(map);

  map.on('click', () => closePanel());
}

async function loadData() {
  if (GAS_URL === 'https://script.google.com/macros/s/AKfycbyRvxS-vojpnEUgK1x3XF8cga5x2zd0PAFEelrox4S6scUtxP3YdprBP3xls8HRTDhO/exec') {
    properties = SAMPLE_DATA;
    showToast('📋 デモデータを表示中（GAS未連携）');
  } else {
    try {
      const res = await fetch(GAS_URL + '?action=getAll');
      const json = await res.json();
      properties = json.properties || [];
    } catch(e) {
      properties = SAMPLE_DATA;
      showToast('⚠️ データ取得失敗。デモデータを表示');
    }
  }
  renderMarkers();
  renderList();
}

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hide');
  setTimeout(() => el.remove(), 500);
}

// ============================================================
// 地図ピン
// ============================================================
function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  properties.forEach(p => {
    if (!p.lat || !p.lng) return;
    const color = STATUS_COLOR[p.status] || 'var(--gray)';
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:28px;height:28px;
        background:${color};
        border:2.5px solid #fff;
        border-radius:50% 50% 50% 0;
        transform:rotate(-45deg);
        box-shadow:0 2px 6px rgba(0,0,0,.22);
        display:flex;align-items:center;justify-content:center;">
        <div style="width:9px;height:9px;background:#fff;border-radius:50%;transform:rotate(45deg);"></div>
      </div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 28],
    });
    const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);
    marker.on('click', () => openPanel(p));
    markers[p.id] = marker;
  });

  document.getElementById('count-badge').textContent = `${properties.length}件`;
}

// ============================================================
// 詳細パネル
// ============================================================
function openPanel(p) {
  currentProperty = p;
  document.getElementById('panel-name').textContent = p.name || '名称未設定';
  document.getElementById('panel-address').textContent = p.name || '';
  const badge = document.getElementById('panel-status-badge');
  badge.textContent = p.status || '—';
  badge.style.background = STATUS_BG[p.status] || '#f1f3f5';
  badge.style.color      = STATUS_FG[p.status] || '#6c757d';
  document.getElementById('pc-type').textContent     = p.type || '—';
  document.getElementById('pc-age').textContent      = p.age || '—';
  document.getElementById('pc-assigned').textContent = p.assigned || '—';
  document.getElementById('pc-last').textContent     = p.lastVisit || '—';
  document.getElementById('pc-next').textContent     = p.nextVisit || '—';
  document.getElementById('pc-owner').textContent    = p.ownerName || '—';
  document.getElementById('panel-memo').textContent  = p.memo || 'メモなし';
  document.getElementById('detail-panel').classList.add('open');

  map.panTo([p.lat, p.lng]);
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  currentProperty = null;
}

function callOwner() {
  if (!currentProperty?.ownerTel) return showToast('電話番号が登録されていません');
  window.location.href = 'tel:' + currentProperty.ownerTel.replace(/-/g,'');
}

function openInMaps() {
  if (!currentProperty) return;
  const url = `https://maps.google.com/?q=${currentProperty.lat},${currentProperty.lng}`;
  window.open(url, '_blank');
}

// ============================================================
// 訪問記録フォーム
// ============================================================
function openVisitForm() {
  if (!currentProperty) return;
  document.getElementById('visit-status').value = currentProperty.status || '訪問済';
  document.getElementById('visit-next').value = '';
  document.getElementById('visit-memo').value = '';
  document.getElementById('visit-photo').value = '';
  document.getElementById('visit-overlay').classList.add('open');
}

function closeVisit() {
  document.getElementById('visit-overlay').classList.remove('open');
}

function closeVisitOnBg(e) {
  if (e.target === document.getElementById('visit-overlay')) closeVisit();
}

async function submitVisit() {
  if (!currentProperty) return;
  const btn = document.getElementById('visit-submit');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const visitData = {
    status:    document.getElementById('visit-status').value,
    nextVisit: document.getElementById('visit-next').value,
    memo:      document.getElementById('visit-memo').value,
    photoUrl:  document.getElementById('visit-photo').value,
  };

  if (GAS_URL === 'https://script.google.com/macros/s/AKfycbyRvxS-vojpnEUgK1x3XF8cga5x2zd0PAFEelrox4S6scUtxP3YdprBP3xls8HRTDhO/exec') {
    // デモ：ローカル更新のみ
    const p = properties.find(x => x.id === currentProperty.id);
    if (p) {
      p.status    = visitData.status;
      p.nextVisit = visitData.nextVisit;
      p.memo      = visitData.memo;
      p.lastVisit = new Date().toLocaleDateString('ja-JP');
    }
    currentProperty = { ...currentProperty, ...p };
    renderMarkers();
    renderList();
    closeVisit();
    openPanel(currentProperty);
    showToast('✅ 保存しました（デモ）');
  } else {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action:'updateVisit', id: currentProperty.id, visitData }),
      });
      await loadData();
      closeVisit();
      showToast('✅ スプレッドシートに保存しました');
    } catch(e) {
      showToast('❌ 保存に失敗しました');
    }
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> スプレッドシートに保存';
}

// ============================================================
// 物件追加フォーム
// ============================================================
async function submitAdd() {
  const name = document.getElementById('add-name').value.trim();
  const lat  = document.getElementById('add-lat').value;
  const lng  = document.getElementById('add-lng').value;
  if (!name) return showToast('⚠️ 物件名・住所は必須です');
  if (!lat||!lng) return showToast('⚠️「住所からピン位置を取得」を押してください');

  const property = {
    name,
    lat: parseFloat(lat),
    lng: parseFloat(lng),
    status:    document.getElementById('add-status').value,
    type:      document.getElementById('add-type').value,
    age:       document.getElementById('add-age').value,
    building:  document.getElementById('add-building').value,
    ownerName: document.getElementById('add-owner-name').value,
    ownerTel:  document.getElementById('add-owner-tel').value,
    assigned:  document.getElementById('add-assigned').value,
    memo:      document.getElementById('add-memo').value,
  };

  if (GAS_URL === 'https://script.google.com/macros/s/AKfycbyRvxS-vojpnEUgK1x3XF8cga5x2zd0PAFEelrox4S6scUtxP3YdprBP3xls8HRTDhO/exec') {
    const newId = 'P-' + String(properties.length + 1).padStart(3,'0');
    properties.push({ ...property, id: newId, lastVisit:'', nextVisit:'', photoUrl:'' });
    renderMarkers();
    renderList();
    clearAddForm();
    switchTab('map');
    showToast('✅ 物件を追加しました（デモ）');
  } else {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action:'add', property }),
      });
      await loadData();
      clearAddForm();
      switchTab('map');
      showToast('✅ スプレッドシートに保存しました');
    } catch(e) {
      showToast('❌ 追加に失敗しました');
    }
  }
}

function clearAddForm() {
  ['add-name','add-type','add-status','add-assigned','add-age',
   'add-building','add-owner-name','add-owner-tel','add-memo',
   'add-lat','add-lng'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = (id === 'add-status') ? '未訪問' : '';
  });
  document.getElementById('lat-lng-display').textContent = '「住所からピン位置を取得」を押してください';
  const gpsbtn = document.getElementById('gps-btn');
  gpsbtn.textContent = '住所からピン位置を取得';
  gpsbtn.style.color = '';
  gpsbtn.disabled = false;
}

// ============================================================
// 住所→緯度経度変換（ジオコーディング）
// ============================================================
async function geocodeAddress() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) return showToast('⚠️ 先に物件名・住所を入力してください');

  const btn = document.getElementById('gps-btn');
  btn.textContent = '変換中...';
  btn.disabled = true;

  try {
    const encoded = encodeURIComponent(name);
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encoded}&format=json&limit=1&countrycodes=jp`,
      { headers: { 'Accept-Language': 'ja' } }
    );
    const data = await res.json();

    if (data.length === 0) {
      showToast('⚠️ 住所が見つかりませんでした。より詳しい住所を入力してください');
      btn.textContent = '住所からピン位置を取得';
      btn.disabled = false;
      return;
    }

    const lat = parseFloat(data[0].lat).toFixed(6);
    const lng = parseFloat(data[0].lon).toFixed(6);
    document.getElementById('add-lat').value = lat;
    document.getElementById('add-lng').value = lng;
    document.getElementById('lat-lng-display').textContent = `📍 位置を取得しました（${data[0].display_name.slice(0,30)}...）`;
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 取得完了';
    btn.style.color = 'var(--green-mid)';
    btn.disabled = false;
    showToast('✅ 住所の位置を取得しました');
  } catch(e) {
    showToast('⚠️ 位置の取得に失敗しました。ネット接続を確認してください');
    btn.textContent = '住所からピン位置を取得';
    btn.disabled = false;
  }
}

function locateMe() {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
  }, () => showToast('⚠️ 位置情報を取得できませんでした'));
}

// ============================================================
// 音声入力
// ============================================================
function startVoice(targetId, btnId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return showToast('⚠️ このブラウザは音声入力に対応していません');

  if (recognition && listeningBtn === btnId) {
    recognition.stop();
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  const btn = document.getElementById(btnId);
  btn.classList.add('listening');
  listeningBtn = btnId;

  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    const target = document.getElementById(targetId);
    target.value += (target.value ? '\n' : '') + text;
  };
  recognition.onend = () => {
    btn.classList.remove('listening');
    listeningBtn = null;
  };
  recognition.onerror = () => {
    btn.classList.remove('listening');
    listeningBtn = null;
    showToast('⚠️ 音声認識に失敗しました');
  };
  recognition.start();
}

// ============================================================
// 一覧
// ============================================================
function renderList() {
  const body = document.getElementById('list-body');
  const filtered = currentFilter === 'all'
    ? properties
    : properties.filter(p => p.status === currentFilter);

  if (filtered.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px 20px;font-size:14px;">該当する物件がありません</div>';
    return;
  }

  body.innerHTML = filtered.map(p => `
    <div class="list-card" onclick="goToPin('${p.id}')">
      <div class="list-pin-dot" style="background:${STATUS_COLOR[p.status]||'var(--gray)'}"></div>
      <div class="list-card-body">
        <div class="list-card-name">${p.name || '名称未設定'}</div>
        <div class="list-card-meta">${p.type||''}${p.type&&p.age?' · ':''}${p.age||''}${p.lastVisit?' · 最終訪問:'+p.lastVisit:''}</div>
      </div>
      <div class="list-card-status" style="background:${STATUS_BG[p.status]||'#f1f3f5'};color:${STATUS_FG[p.status]||'#6c757d'}">${p.status||'—'}</div>
    </div>
  `).join('');
}

function setFilter(val, el) {
  currentFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function goToPin(id) {
  const p = properties.find(x => x.id === id);
  if (!p) return;
  switchTab('map');
  if (p.lat && p.lng) {
    map.setView([p.lat, p.lng], 16);
    setTimeout(() => openPanel(p), 200);
  }
}

// ============================================================
// タブ切替
// ============================================================
function switchTab(tab) {
  ['map','list','add'].forEach(t => {
    document.getElementById('view-'+t).style.display = 'none';
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('view-'+tab).style.display = 'flex';
  document.getElementById('tab-'+tab).classList.add('active');

  const addBtn = document.getElementById('add-submit');
  addBtn.style.display = tab === 'add' ? 'flex' : 'none';

  if (tab !== 'map') closePanel();
  if (tab === 'map') setTimeout(() => map.invalidateSize(), 100);
}

// ============================================================
// 設定
// ============================================================
function showSettings() {
  const current = localStorage.getItem('gasUrl') || '';
  const url = prompt('GASのウェブアプリURLを入力してください:\n（GASセットアップ手順のSTEP5で取得したURL）', current);
  if (url !== null && url.trim()) {
    localStorage.setItem('gasUrl', url.trim());
    showToast('✅ URLを保存しました。再読み込みしてください');
  }
}

// ============================================================
// ユーティリティ
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function focusSearch() {
  const q = prompt('住所または物件名で検索');
  if (!q) return;
  const found = properties.filter(p =>
    (p.name||'').includes(q)
  );
  if (found.length === 0) return showToast('該当する物件が見つかりません');
  goToPin(found[0].id);
}

// 設定からGAS URLを読み込む
const savedUrl = localStorage.getItem('gasUrl');
</script>
